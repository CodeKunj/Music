  <link rel="stylesheet" href="css/admin.css" />

</head>
<body>
<div class="admin-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" aria-label="Admin navigation">
    <div class="sidebar-logo"><img src="../images/profile.png" class="sidebar-logo-mark" alt="KR" style="object-fit:cover; border-radius:8px;" /><div><span>Kunj Rana</span><span class="sidebar-logo-sub">Admin</span></div></div>
    <nav class="sidebar-nav">
      <span class="nav-group-label">Overview</span>
      <a href="dashboard.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
      <span class="nav-group-label">Content</span>
      <a href="tracks.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>Tracks</a>
      <a href="services.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>Services</a>
      <a href="testimonials.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Testimonials</a>
      <a href="before-after.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Before &amp; After</a>
      <span class="nav-group-label">Inbox</span>
      <a href="contacts.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Contact Inbox</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <header class="top-header">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-toggle" aria-label="Toggle menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div><p class="header-title">Contact Inbox</p></div>
      </div>
    </header>

    <div class="page-body">
      <div class="page-header">
        <div><h1 class="page-title">Messages</h1><p class="page-subtitle">Enquiries from your portfolio website.</p></div>
      </div>

      <div class="table-wrap">
        <table aria-label="Messages List">
          <thead>
            <tr>
              <th style="width:10px"></th>
              <th>Name</th>
              <th>Email</th>
              <th>Project Type</th>
              <th>Date</th>
              <th style="width:100px">Actions</th>
            </tr>
          </thead>
          <tbody id="contacts-tbody">
            <!-- Rendered via JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="msg-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Message Details</h2>
      <button class="modal-close" data-close-modal><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" style="line-height:1.8">
      <div style="display:flex;gap:40px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)">
        <div><span class="text-3" style="font-size:12px">NAME</span><div class="fw-600" id="m-name"></div></div>
        <div><span class="text-3" style="font-size:12px">EMAIL</span><div class="text-2" id="m-email"></div></div>
      </div>
      <div style="display:flex;gap:40px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)">
        <div><span class="text-3" style="font-size:12px">PROJECT</span><div class="fw-600" id="m-type"></div></div>
        <div><span class="text-3" style="font-size:12px">BUDGET</span><div class="text-2" id="m-budget"></div></div>
      </div>
      <div><span class="text-3" style="font-size:12px">MESSAGE</span><div id="m-msg" style="margin-top:8px;background:var(--bg-2);padding:16px;border-radius:var(--radius-md)"></div></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal>Close</button>
      <a href="#" class="btn btn-primary" id="m-reply">Reply via Email</a>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth } from './js/admin-auth.js';
  import { getAllContacts, markContactRead, deleteContact } from './js/admin-api.js';
  import { toast, confirm, openModal, setActiveSidebarLink, initMobileSidebar, timeAgo } from './js/admin-ui.js';

  await requireAuth();
  setActiveSidebarLink();
  initMobileSidebar();

  let allData = [];
  const tbody = document.getElementById('contacts-tbody');
  const modal = document.getElementById('msg-modal');

  async function loadData() {
    try {
      allData = await getAllContacts();
      render();
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  function render() {
    tbody.innerHTML = allData.map(c => `
      <tr style="background:${!c.is_read ? 'rgba(139,94,60,0.05)' : 'transparent'}">
        <td>${!c.is_read ? '<div style="width:8px;height:8px;background:var(--accent);border-radius:50%"></div>' : ''}</td>
        <td class="${!c.is_read ? 'fw-700' : 'fw-600'}">${c.name}</td>
        <td class="text-2">${c.email}</td>
        <td><span class="badge" style="background:var(--bg-2);color:var(--text-2);border:1px solid var(--border)">${c.project_type || 'General'}</span></td>
        <td class="text-2">${timeAgo(c.created_at)}</td>
        <td>
          <div class="td-actions">
            <button class="icon-btn" onclick="viewMsg('${c.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
            <button class="icon-btn danger" onclick="removeMsg('${c.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>
          </div>
        </td>
      </tr>
    `).join('') || `<tr><td colspan="6" class="table-empty">No messages found.</td></tr>`;
  }

  window.viewMsg = async (id) => {
    const c = allData.find(x => x.id === id);
    if (!c) return;
    
    document.getElementById('m-name').textContent = c.name;
    document.getElementById('m-email').textContent = c.email;
    document.getElementById('m-type').textContent = c.project_type || '—';
    document.getElementById('m-budget').textContent = c.budget || '—';
    document.getElementById('m-msg').textContent = c.message;
    document.getElementById('m-reply').href = `mailto:${c.email}`;
    
    openModal(modal);

    if (!c.is_read) {
      c.is_read = true;
      render();
      await markContactRead(id, true);
    }
  };

  window.removeMsg = async (id) => {
    if (await confirm('Delete message?')) {
      await deleteContact(id);
      toast('Deleted', 'success');
      loadData();
    }
  };

  loadData();
</script>
</body>
</html>
