<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Login | Kunj Rana Portfolio</title>
  <!-- Replace with your actual Supabase project values -->
  <meta name="supabase-url"  content="https://csszhetrncjrhujdwqkz.supabase.co" />
  <meta name="supabase-anon" content="sb_publishable_Im0l0sQfP_bmi1QmF-430w_urObXq2R" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

<div class="login-page" role="main">
  <div class="login-orb login-orb-1" aria-hidden="true"></div>
  <div class="login-orb login-orb-2" aria-hidden="true"></div>

  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-mark" aria-hidden="true">KR</div>
      <div>
        <span>Kunj Rana</span>
        <span class="sidebar-logo-sub">Admin Panel</span>
      </div>
    </div>

    <h1 class="login-title">Welcome back</h1>
    <p class="login-subtitle">Sign in to manage your music portfolio.</p>

    <div class="login-error" id="login-error" role="alert" aria-live="assertive"></div>

    <form id="login-form" novalidate>
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label" for="login-email">Email Address</label>
        <input
          type="email"
          id="login-email"
          name="email"
          class="form-input"
          placeholder="admin@example.com"
          autocomplete="email"
          required
          aria-required="true"
        />
      </div>

      <div class="form-group" style="margin-bottom:24px">
        <label class="form-label" for="login-password">Password</label>
        <div style="position:relative">
          <input
            type="password"
            id="login-password"
            name="password"
            class="form-input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
            aria-required="true"
            style="padding-right:42px"
          />
          <button
            type="button"
            id="toggle-pw"
            aria-label="Show password"
            style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-3);cursor:pointer;display:flex;padding:4px;"
          >
            <svg id="pw-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="login-btn" style="width:100%;padding:12px;font-size:1rem;justify-content:center;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" aria-hidden="true">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Sign In
      </button>
    </form>

    <p style="margin-top:20px;text-align:center;font-size:0.8125rem;color:var(--text-3)">
      <a href="/" style="color:var(--accent)">← Back to Portfolio</a>
    </p>
  </div>
</div>

<script type="module">
  import { signIn, redirectIfLoggedIn } from './js/admin-auth.js';

  // Redirect to dashboard if already logged in
  await redirectIfLoggedIn();

  const form    = document.getElementById('login-form');
  const errEl   = document.getElementById('login-error');
  const btn     = document.getElementById('login-btn');
  const pwInput = document.getElementById('login-password');
  const eyeBtn  = document.getElementById('toggle-pw');

  // Password visibility toggle
  eyeBtn.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeBtn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    document.getElementById('pw-eye').innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.textContent = '';
    errEl.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    const email    = document.getElementById('login-email').value.trim();
    const password = pwInput.value;

    if (!email || !password) {
      showError('Please enter your email and password.');
      return resetBtn();
    }

    const { error } = await signIn(email, password);

    if (error) {
      showError(error);
      resetBtn();
    } else {
      window.location.href = '/admin/dashboard.html';
    }
  });

  function showError(msg) {
    errEl.textContent = msg;
    errEl.classList.add('show');
  }
  function resetBtn() {
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In`;
  }
</script>
</body>
</html>
